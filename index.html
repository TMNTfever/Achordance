<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achordance</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: none; }
        #menu { pointer-events: auto; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; }
        #health-bar-container { position: absolute; bottom: 20px; width: 300px; height: 20px; border: 2px solid white; display: none; }
        #health-bar { width: 100%; height: 100%; background: lime; transition: width 0.2s; }
        .song-btn { display: block; margin: 10px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="menu">
            <h1>Achordance</h1>
            <p>Connect your MIDI keyboard to play</p>
            <button class="song-btn" onclick="startGame('song1.mp3')">Cyberpunk Beat</button>
            <button class="song-btn" onclick="startGame('song2.mp3')">Synthwave Night</button>
        </div>
        <div id="health-bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <!-- Load Three.js from CDN -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
     /* Start of main functionality*/
        
        import * as THREE from 'three';
        const SHARPS = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const FLATS = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Bb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const activeNotes = new Set();
        
        // Scene setup with 16:9 ratio
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 16/9, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerWidth * (9/16)); // 16:9 aspect ratio
        document.body.appendChild(renderer.domElement);

        // Game Objects
        const cityGeo = new THREE.BoxGeometry(2, 10, 2); // Width, Height, Depth
        const cityMat = new THREE.MeshStandardMaterial({ color: 0x00ff88 });
        const city = new THREE.Mesh(cityGeo, cityMat);
        scene.add(city);

        const light = new THREE.PointLight(0xffffff, 100, 100);
        light.position.set(0, 10, 10);
        scene.add(light);
        camera.position.z = 15;
        
        // MIDI Setup
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(onMidiSuccess, () => console.log("MIDI access failed"));
        }

        // Game Logic
        let health = 100;
        let enemies = [];
        let isPlaying = false;

        // Game start
        window.startGame = (songUrl) => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('health-bar-container').style.display = 'block';
            isPlaying = true;
            
            // Load audio here using THREE.AudioLoader

            // Call external .js file to start launching enemies timed to music
        };
        
        animate();
        
    /* End of main functionality */
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlaying) {
                // Update enemy positions and check for city damage
                updateEnemies();
                checkMidiInput();
            }

            renderer.render(scene, camera);
        } // End of animate()

        function checkDefeat() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const required = enemy.userData.requiredNotes;
        
                // Check if all required notes are currently pressed
                const isMatch = required.every(note => activeNotes.has(note));
                
                // For chords: Ensure the number of pressed keys matches the requirement
                if (isMatch && (!enemy.userData.isChord || activeNotes.size === required.length)) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    console.log("Enemy Defeated!");
                }
            }
        } // End of checkDefeat()

        function createTextLabel(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
        
            // Background (optional, helps readability)
            context.fillStyle = 'rgba(0, 0, 0, 0.5)';
            context.fillRect(0, 0, canvas.width, canvas.height);
        
            // Text Style
            context.font = 'Bold 80px Arial';
            context.fillStyle = 'white';
            context.textAlign = 'center';
            context.fillText(text, 128, 90);
        
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            
            // Scale the label so it's readable
            sprite.scale.set(2, 1, 1); 
            return sprite;
        } // End of createTextLabel()
        
        function getNoteData(midiNumber) {
            const name = NOTES[midiNumber % 12];
            const octave = Math.floor(midiNumber / 12) - 1;
            // Standard 88-key piano is MIDI 21 to 108. Middle C is 60.
            const side = midiNumber < 60 ? 'left' : 'right'; 
            return { name, octave, side };
        } // End of getNoteData

        function handleMidiMessage(msg) {
            const [status, note, velocity] = msg.data;
            const isNoteOn = (status & 0xf0) === 0x90 && velocity > 0;
            const isNoteOff = (status & 0xf0) === 0x80 || (velocity === 0);
        
            if (isNoteOn) {
                activeNotes.add(note);
                checkDefeat();
            } else if (isNoteOff) {
                activeNotes.delete(note);
            }
        } // End of handleMidiMessage()
        
        function onMidiSuccess(midiAccess) {
            for (let input of midiAccess.inputs.values()) {
                input.onmidimessage = handleMidiMessage;
            }
        } // End of onMidiSuccess()

        function spawnEnemy(side, notesArray) {
            let geometry;
            const noteCount = notesArray.length;
        
            // Pick shape based on note count
            if (noteCount === 1) {
                geometry = new THREE.SphereGeometry(0.7, 16, 16); // Single Note
            } else if (noteCount === 2 || noteCount === 3) {
                geometry = new THREE.TetrahedronGeometry(1);     // 3-Note Chord
            } else if (noteCount === 4) {
                geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2); // 4-Note Chord
            } else {
                geometry = new THREE.OctahedronGeometry(1);      // Fallback
            }
        
            const material = new THREE.MeshStandardMaterial({ 
                color: side === 'left' ? 0xff4444 : 0x4444ff,
                wireframe: noteCount > 1 // Visual hint for chords
            });
        
            const enemy = new THREE.Mesh(geometry, material);

            // Create and attach the label
            const label = createTextLabel(labelName);
            label.position.set(0, 1.5, 0); // Position slightly above the shape
            enemy.add(label); 
            
            // Position based on side (16:9 screen bounds)
            const xPos = side === 'left' ? -15 : 15;
            enemy.position.set(xPos, 0, 0);
        
            // Store the logic data
            enemy.userData = {
                requiredNotes: notesArray, // e.g., [60, 64, 67] for C Major
                side: side,
                speed: 0.05
            };
        
            scene.add(enemy);
            enemies.push(enemy);
        } // End of spawnEnemy()

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                // Move towards center
                if (enemy.position.x > 0) enemy.position.x -= enemy.userData.speed;
                if (enemy.position.x < 0) enemy.position.x += enemy.userData.speed;
        
                // Collision with City (Center)
                if (Math.abs(enemy.position.x) < 1.5) {
                    takeDamage(10);
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                }
            }
        } // End of updateEnemies()
    </script>
</body>
</html>
